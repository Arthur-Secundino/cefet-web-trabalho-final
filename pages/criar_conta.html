<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ShelfLog</title>
        <link rel="stylesheet" href="../styles/estilos_comuns.css">
        <link rel="stylesheet" href="../styles/estilo_form.css">
    </head>
    <body>
        <main>
            <h1>Crie sua conta</h1>
            <form action="criar_conta.js">
                <label for="nome">Nome do usuário: <input name="nome" type="text"></label>
                <label for="e-mail">E-mail: <input name="e-mail" type="text"></label>
                <label for="senha">Senha: <input name="senha" type="text"></label>

                <div class="botoes-form">
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpar</button>
                </div>
            </form>
        </main>
    </body>
</html>
